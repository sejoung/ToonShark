<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToonShark - Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #080c14;
      --bg-surface: #0d1321;
      --bg-card: #131a2e;
      --bg-card-hover: #1a2340;
      --accent: #00e5c8;
      --accent-dim: rgba(0, 229, 200, 0.12);
      --accent-glow: rgba(0, 229, 200, 0.3);
      --text: #e8ecf4;
      --text-dim: #7a8ba8;
      --text-muted: #4a5872;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(0, 229, 200, 0.25);
      --danger: #ff4d6a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-layer::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(0, 229, 200, 0.04) 0%, transparent 70%);
      animation: drift 20s ease-in-out infinite alternate;
    }

    .bg-layer::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(0, 100, 200, 0.05) 0%, transparent 70%);
      animation: drift 25s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(60px, 40px) rotate(3deg); }
    }

    /* Grid noise overlay */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0z' fill='none'/%3E%3Cpath d='M0 60V0h1v60zm15 0V0h1v60zm15 0V0h1v60zm15 0V0h1v60zM0 0h60v1H0zm0 15h60v1H0zm0 15h60v1H0zm0 15h60v1H0z' fill='%23fff'/%3E%3C/svg%3E");
    }

    .page-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    /* Header */
    header {
      padding: 20px 0;
      position: relative;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-link:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .header-link svg {
      width: 16px;
      height: 16px;
    }

    .lang-toggle {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-dim);
      font-family: inherit;
      transition: all 0.2s;
    }

    .lang-toggle:hover {
      border-color: var(--border-hover);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 72px 0 48px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid rgba(0, 229, 200, 0.15);
      animation: fadeInUp 0.6s ease both;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 14px;
      animation: fadeInUp 0.6s ease 0.1s both;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(135deg, var(--accent), #00a5ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-tagline {
      font-size: 1.15rem;
      color: var(--text);
      font-weight: 600;
      max-width: 420px;
      margin: 0 auto 8px;
      animation: fadeInUp 0.6s ease 0.15s both;
    }

    .hero p {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 420px;
      margin: 0 auto;
      animation: fadeInUp 0.6s ease 0.25s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Download Section */
    .download-section {
      padding: 0 0 48px;
      animation: fadeInUp 0.6s ease 0.3s both;
    }

    .primary-download {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .primary-download:hover {
      border-color: var(--border-hover);
    }

    .primary-download::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    .os-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      margin-bottom: 20px;
    }

    .os-badge svg {
      width: 22px;
      height: 22px;
      color: var(--text);
    }

    .os-badge .os-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .primary-download h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .primary-download .version-info {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: var(--bg-deep);
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      transition: all 0.25s;
      letter-spacing: -0.01em;
      box-shadow: 0 0 24px var(--accent-glow), 0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px var(--accent-glow), 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .btn-download:active {
      transform: translateY(0);
    }

    .btn-download svg {
      width: 18px;
      height: 18px;
    }

    .file-meta {
      display: block;
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* Other Downloads */
    .other-downloads {
      margin-top: 8px;
    }

    .other-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .download-grid {
      display: grid;
      gap: 8px;
    }

    .download-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      transition: all 0.2s;
    }

    .download-item:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .download-item .info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .download-item .os-icon-small {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .download-item .os-icon-small svg {
      width: 18px;
      height: 18px;
      color: var(--text-dim);
    }

    .download-item .name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .download-item .meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Notice */
    .notice-section {
      padding: 0 0 24px;
      animation: fadeInUp 0.6s ease 0.35s both;
    }

    .notice-card {
      background: rgba(255, 200, 50, 0.06);
      border: 1px solid rgba(255, 200, 50, 0.15);
      border-radius: 12px;
      padding: 18px 22px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .notice-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: #f0c040;
      margin-top: 2px;
    }

    .notice-icon svg {
      width: 20px;
      height: 20px;
    }

    .notice-title {
      font-weight: 600;
      font-size: 0.88rem;
      color: #f0c040;
      margin-bottom: 4px;
    }

    .notice-body {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.55;
    }

    .notice-body strong {
      color: var(--text);
    }

    /* Docs Section */
    .docs-section {
      padding: 0 0 64px;
      animation: fadeInUp 0.6s ease 0.4s both;
    }

    .section-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .docs-grid {
      display: grid;
      gap: 10px;
    }

    .doc-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .doc-card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .doc-card .doc-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .doc-card .doc-icon svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    .doc-card .doc-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 3px;
    }

    .doc-card .doc-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Footer */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--accent); }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { font-size: 0.9rem; }
    .loading a { color: var(--accent); }

    /* Responsive */
    @media (max-width: 600px) {
      .hero { padding: 48px 0 32px; }
      .hero h1 { font-size: 2rem; }
      .hero p { font-size: 0.95rem; }
      .primary-download { padding: 28px 20px; }
      .primary-download h2 { font-size: 1.2rem; }
      .btn-download { padding: 12px 28px; font-size: 0.95rem; }
      .docs-grid { grid-template-columns: 1fr; }
      .download-item {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
      .download-item .btn-outline {
        align-self: stretch;
        text-align: center;
      }
      .footer-inner {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
  </style>
</head>

let currentLang = navigator.language.startsWith('ko') ? 'ko' : 'en';
let releaseData = null;

function t(key) { return i18n[currentLang][key]; }

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ko' : 'en';
  updateUI();
}

function detectOS() {
  const ua = navigator.userAgent;
  if (ua.includes('Win')) return 'windows';
  if (ua.includes('Mac')) {
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl');
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
      if (renderer.includes('Apple M')) return 'mac-arm';
      return 'mac-intel';
    } catch (e) {
      return 'mac-arm';
    }
  }
  if (ua.includes('Linux')) return 'linux';
  return 'unknown';
}

function categorizeAssets(assets) {
  const categories = { 'windows': [], 'mac-intel': [], 'mac-arm': [], 'linux': [] };
  for (const asset of assets) {
    const name = asset.name.toLowerCase();
    if (name.endsWith('.blockmap') || name.endsWith('.yml')) continue;
    if (name.endsWith('.exe')) {
      if (name.includes('-setup-') || categories['windows'].length === 0) {
        categories['windows'].unshift(asset);
      } else {
        categories['windows'].push(asset);
      }
    } else if (name.endsWith('.dmg') && name.includes('arm64')) {
      categories['mac-arm'].push(asset);
    } else if (name.endsWith('.dmg')) {
      categories['mac-intel'].push(asset);
    } else if (name.endsWith('.appimage') || name.endsWith('.deb') || name.endsWith('.rpm') || name.endsWith('.snap')) {
      categories['linux'].push(asset);
    }
  }
  return categories;
}

const osInfo = {
  'windows': { icon: 'windows', name: 'Windows' },
  'mac-intel': { icon: 'apple', name: 'macOS (Intel)' },
  'mac-arm': { icon: 'apple', name: 'macOS (Apple Silicon)' },
  'linux': { icon: 'linux', name: 'Linux' },
};

function formatSize(bytes) {
  if (!bytes) return '';
  const mb = bytes / (1024 * 1024);
  return mb.toFixed(1) + ' MB';
}

function renderDownloads() {
  if (!releaseData) return;
  const { tag_name, assets } = releaseData;
  const categories = categorizeAssets(assets);
  const userOS = detectOS();
  const primaryOS = categories[userOS]?.length ? userOS : 'windows';
  const primaryAsset = categories[primaryOS]?.[0];

  let html = '';

  if (primaryAsset) {
    const os = osInfo[primaryOS];
    html += `
      <div class="primary-download">
        <div class="os-badge">
          ${SVG_ICONS[os.icon]}
          <span class="os-name">${os.name}</span>
        </div>
        <h2>${t('downloadFor')} ${os.name}</h2>
        <div class="version-info">${t('version')} ${tag_name} &middot; ${t('recommended')}</div>
        <a class="btn-download" href="${primaryAsset.browser_download_url}">
          ${SVG_ICONS.download}
          ${primaryAsset.name}
        </a>
        <span class="file-meta">${formatSize(primaryAsset.size)}</span>
      </div>
    `;
  }

  const otherEntries = Object.entries(categories)
    .filter(([os, list]) => os !== primaryOS && list.length > 0);

  if (otherEntries.length > 0) {
    html += `<div class="other-downloads"><div class="other-title">${t('otherDownloads')}</div><div class="download-grid">`;
    for (const [os, list] of otherEntries) {
      for (const asset of list) {
        const info = osInfo[os];
        html += `
          <div class="download-item">
            <div class="info">
              <div class="os-icon-small">${SVG_ICONS[info.icon]}</div>
              <div>
                <div class="name">${info.name}</div>
                <div class="meta">${asset.name} &middot; ${formatSize(asset.size)}</div>
              </div>
            </div>
            <a class="btn-outline" href="${asset.browser_download_url}">${t('download')}</a>
          </div>
        `;
      }
    }
    html += `</div></div>`;
  }

  document.getElementById('downloadContent').innerHTML = html;
}

function updateUI() {
  document.getElementById('heroBadge').textContent = t('heroBadge');
  document.getElementById('heroTitle').innerHTML = t('heroTitle');
  document.getElementById('heroTagline').textContent = t('heroTagline');
  document.getElementById('heroDesc').textContent = t('heroDesc');
  document.getElementById('langBtn').textContent = t('langBtn');
  document.getElementById('docsTitle').textContent = t('docsTitle');
  document.getElementById('footerText').innerHTML = t('footerText');
  document.getElementById('footerIssues').textContent = t('footerIssues');
  document.getElementById('footerReleases').textContent = t('footerReleases');
  document.documentElement.lang = currentLang;

  const docIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
  document.getElementById('docsGrid').innerHTML = `
    <a class="doc-card" href="${t('docUrl')}" target="_blank" rel="noopener">
      <div class="doc-icon">${docIcon}</div>
      <div>
        <div class="doc-title">${t('docTitle')}</div>
        <div class="doc-desc">${t('docDesc')}</div>
      </div>
    </a>
  `;

  const ua = navigator.userAgent;
  const osNotice = document.getElementById('osNotice');
  if (ua.includes('Mac')) {
    osNotice.style.display = '';
    document.getElementById('osNoticeTitle').textContent = t('macNoticeTitle');
    document.getElementById('osNoticeBody').innerHTML = t('macNoticeBody');
  } else if (ua.includes('Win')) {
    osNotice.style.display = '';
    document.getElementById('osNoticeTitle').textContent = t('winNoticeTitle');
    document.getElementById('osNoticeBody').innerHTML = t('winNoticeBody');
  } else {
    osNotice.style.display = 'none';
  }

  if (releaseData) renderDownloads();
}

async function fetchRelease() {
  try {
    const res = await fetch('https://api.github.com/repos/realdraw/ToonShark/releases/latest');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    releaseData = await res.json();
    renderDownloads();
  } catch (e) {
    document.getElementById('downloadContent').innerHTML = `
      <div class="loading">
        <p>${t('errorText')}<br><a href="https://github.com/realdraw/ToonShark/releases" target="_blank" rel="noopener">${t('errorLink')}</a></p>
      </div>
    `;
  }
}

updateUI();
fetchRelease();
